function genSlots(seed) {
  // Generate next 14 days, with some days having 2-3 free slots, some none (waitlist case)
  const days = [];
  const today = new Date(2026, 5, 18); // June 18 2026
  for (let i = 1; i <= 14; i++) {
    const d = new Date(today);
    d.setDate(today.getDate() + i);
    const pseudo = (seed * 31 + i * 17) % 5;
    let slots = [];
    if (pseudo === 0) slots = [];
    else if (pseudo === 1) slots = ["09:00"];
    else if (pseudo === 2) slots = ["14:00", "17:00"];
    else if (pseudo === 3) slots = ["10:00", "13:00", "18:00"];
    else slots = ["16:00"];
    days.push({ date: d, slots });
  }
  return days;
}

function mulberry32(seed) {
  let a = seed;
  return function () {
    a |= 0;
    a = (a + 0x6d2b79f5) | 0;
    let t = Math.imul(a ^ (a >>> 15), 1 | a);
    t = (t + Math.imul(t ^ (t >>> 7), 61 | t)) ^ t;
    return ((t ^ (t >>> 14)) >>> 0) / 4294967296;
  };
}

function pick(rng, arr) {
  return arr[Math.floor(rng() * arr.length)];
}

function generateTherapists(count) {
  const generated = [];
  const fNext = { n: 5 }; // f_001–f_004 a base terapeutáké
  const mNext = { n: 3 }; // m_001–m_002 a base terapeutáké
  for (let i = 0; i < count; i++) {
    const seed = 1000 + i;
    const rng = mulberry32(seed);
    const isFemale = rng() > 0.5;
    const firstName = pick(rng, isFemale ? FIRST_NAMES_F : FIRST_NAMES_M);
    const lastName = pick(rng, LAST_NAMES);
    const name = `${lastName} ${firstName}`;
    const years = Math.floor(rng() * 18) + 1;
    const title = years <= 2 ? pick(rng, ["Pszichológus jelölt", "Pszichológus, szupervízió alatt"]) : pick(rng, TITLES);
    const price = (Math.floor(rng() * 13) + 8) * 1000;
    const rating = Math.round((4.4 + rng() * 0.6) * 10) / 10;
    const reviewCount = Math.floor(rng() * 45) + 3;
    const numTags = Math.floor(rng() * 2) + 2;
    const tags = [];
    // Guarantee exactly 8 generated therapists work with "Kapcsolatok" (i indices 0-7).
    // Combined with the 2 hand-written profiles that already have it
    // (Kovács Anna, Tóth Gabriella), this gives exactly 10 total.
    if (i < 8) tags.push("Kapcsolatok");
    const topicPool = TOPICS.filter((t) => t !== "Kapcsolatok");
    for (let j = 0; j < numTags; j++) {
      const t = pick(rng, topicPool);
      if (!tags.includes(t)) tags.push(t);
    }
    const isOnline = rng() > 0.3;
    const isInPerson = rng() > 0.15;
    const locations = [];
    if (isInPerson) locations.push(`Budapest, ${pick(rng, NEIGHBORHOODS)}`);
    if (isOnline) locations.push("Online");
    if (locations.length === 0) locations.push("Online");
    const initials = (lastName[0] + firstName[0]).toUpperCase();
    const color = pick(rng, COLOR_POOL);
    generated.push({
      id: 100 + i,
      name,
      title,
      years,
      price,
      rating,
      reviewCount,
      locations,
      languages: pick(rng, LANG_SETS),
      tags,
      bio: `Azokkal dolgozom szívesen, akik szeretnének változást elérni az életükben. Fontos számomra a biztonságos, ítélkezésmentes tér, ahol őszintén lehet beszélni a nehéz dolgokról is.`,
      spectrum: {
        supportive: Math.floor(rng() * 5) + 1,
        structured: Math.floor(rng() * 5) + 1,
        direct: Math.floor(rng() * 5) + 1,
        experienced: Math.min(5, Math.max(1, Math.floor(years / 3) + 1)),
      },
      videoColor: color,
      avatarColor: color,
      initials,
      // Nemhelyes portré, amíg van a készletben (f_005-től / m_003-tól, mert
      // f_001–f_004 és m_001–m_002 a base terapeutáké); utána legacy (nem-jelöletlen) pool.
      imageUrl:
        isFemale && fNext.n <= FEMALE_PORTRAIT_COUNT
          ? portraitUrlG("f", fNext.n++)
          : !isFemale && mNext.n <= MALE_PORTRAIT_COUNT
          ? portraitUrlG("m", mNext.n++)
          : portraitUrl(PORTRAIT_FIRST + ((i * 2) % PORTRAIT_COUNT)),
      availability: genSlots(seed),
    });
  }
  return generated;
}

  "Az életünk során mindannyian kerülünk olyan helyzetbe, amikor elfogynak az eszközeink: nem értjük, mi történik velünk, vagy értjük, de nem tudunk változtatni rajta. Ilyenkor egy külső, szakmai nézőpont segíthet meglátni azt, amit belülről nem lehet. Munkámban nagy hangsúlyt fektetek arra, hogy a hozzám fordulók ne csak a tüneteikkel foglalkozzanak, hanem megértsék azok hátterét is — mert tartós változás csak így lehetséges.",

const BIO_UNIS = [
  "az ELTE Pszichológiai Intézetében",
  "a Pécsi Tudományegyetemen",
  "a Szegedi Tudományegyetemen",
  "a Debreceni Egyetemen",
  "a Károli Gáspár Református Egyetemen",
];
const BIO_APPROACHES = [
  "a pszichodinamikus gondolkodás, így többségében hosszabb terápiás folyamatokban dolgozom, amelyek lehetőséget adnak a mélyebb érzelmi elakadások megdolgozására",
  "a kognitív viselkedésterápiás megközelítés: strukturált, célorientált módon dolgozom, és fontos számomra, hogy klienseim a mindennapokban is használható eszközöket kapjanak",
  "a rendszerszemlélet, amely keretet ad a párokkal és családokkal való munkához — a nehézségeket sosem önmagukban, hanem a kapcsolati összefüggéseikben vizsgálom",
  "a személyközpontú megközelítés: hiszek abban, hogy elfogadó, hiteles kapcsolatban mindenkiben megvan a képesség a fejlődésre",
  "a sématerápiás szemlélet, amely segít felismerni és átírni a gyerekkorban gyökerező, mélyen rögzült érzelmi mintázatokat",
  "az integratív szemlélet: nem egyetlen módszerhez ragaszkodom, hanem ahhoz igazítom az eszközöket, amire az adott embernek az adott helyzetben szüksége van",
];
const BIO_CLIENTS = [
  "egyéni felnőtt klienseket fogadok",
  "felnőtteket és fiatal felnőtteket fogadok egyéni terápiában",
  "párokat fogadok, valamint egyéni esetvezetést viszek",
  "egyéni klienseket fogadok, és kiemelt területem a munkahelyi kiégés",
];
function genLongBio(seed, years) {
  const p = (arr, s) => arr[s % arr.length];
  const gradYear = 2026 - years - 4 - (seed % 3);
  const practiceYear = 2026 - years;
  const second =
    `${gradYear}-ben végeztem pszichológusként ${p(BIO_UNIS, seed)}. ` +
    `${practiceYear} óta magánrendelés keretei között ${p(BIO_CLIENTS, seed >> 2)}. ` +
    `Szemléletemben meghatározó ${p(BIO_APPROACHES, seed >> 1)}.`;
  return [p(BIO_OPENINGS, seed), second];
}

}));

function MoodSelect({ value, onChange, options, icon, placeholder, searchable }) {
  const [open, setOpen] = useState(false);
  const [query, setQuery] = useState("");
  const containerRef = React.useRef(null);
  const inputRef = React.useRef(null);

  React.useEffect(() => {
    if (!open) return;
    function handleClickOutside(e) {
      if (containerRef.current && !containerRef.current.contains(e.target)) {
        setOpen(false);
        setQuery("");
      }
    }
    document.addEventListener("mousedown", handleClickOutside);
    return () => document.removeEventListener("mousedown", handleClickOutside);
  }, [open]);

  const filteredOptions = searchable && query ? options.filter((o) => o.toLowerCase().startsWith(query.toLowerCase())) : options;

  const openSelect = () => {
    setOpen(true);
    setQuery("");
    if (searchable) setTimeout(() => inputRef.current && inputRef.current.focus(), 0);
  };

  return (
    <div ref={containerRef} style={{ position: "relative" }}>
      {searchable && open ? (
        <div
          style={{
            width: "100%",
            display: "flex",
            alignItems: "center",
            gap: 8,
            padding: "13px 16px",
            borderRadius: 10,
            border: "0.5px solid #6b7d5e",
            background: "#15160f",
          }}
        >
          {icon}
          <input
            ref={inputRef}
            value={query}
            onChange={(e) => setQuery(e.target.value)}
            placeholder={value || placeholder}
            style={{ flex: 1, background: "transparent", border: "none", outline: "none", color: "#ECE8DD", fontSize: 14.5, padding: 0 }}
          />
        </div>
      ) : (
        <button
          onClick={openSelect}
          style={{
            width: "100%",
            display: "flex",
            alignItems: "center",
            justifyContent: "space-between",
            padding: "13px 16px",
            borderRadius: 10,
            border: "0.5px solid #2a2a26",
            background: "#15160f",
            color: value ? "#ECE8DD" : "#7a786f",
            fontSize: 14.5,
            cursor: "pointer",
          }}
        >
          <span style={{ display: "flex", alignItems: "center", gap: 8 }}>
            {icon}
            {value || placeholder}
          </span>
          <ChevronLeft size={15} style={{ transform: "rotate(-90deg)", color: "#6b6a62" }} />
        </button>
      )}
      {open && (
        <div
          style={{
            position: "absolute",
            top: "calc(100% + 6px)",
            left: 0,
            right: 0,
            background: "#15160f",
            border: "0.5px solid #2a2a26",
            borderRadius: 10,
            padding: 6,
            maxHeight: 280,
            overflowY: "auto",
            zIndex: 10,
          }}
        >
          {filteredOptions.length === 0 && <div style={{ padding: "10px 12px", fontSize: 13, color: "#6a6862" }}>Nincs egyező téma</div>}
          {filteredOptions.map((opt) => (
            <div
              key={opt}
              onClick={() => {
                onChange(opt);
                setOpen(false);
                setQuery("");
              }}
              style={{
                padding: "10px 12px",
                borderRadius: 7,
                fontSize: 14,
                color: value === opt ? "#cfd9b8" : "#d4d2c8",
                background: value === opt ? "#2a3324" : "transparent",
                cursor: "pointer",
              }}
              onMouseEnter={(e) => (e.currentTarget.style.background = "#202117")}
              onMouseLeave={(e) => (e.currentTarget.style.background = value === opt ? "#2a3324" : "transparent")}
            >
              {opt}
            </div>
          ))}
        </div>
      )}
    </div>
  );
}

function BookingView({ therapist, onBack, onConfirm, isLoggedIn, onRequireLogin }) {
  const [selectedDay, setSelectedDay] = useState(null);
  const [selectedSlot, setSelectedSlot] = useState(null);
  const [confirmed, setConfirmed] = useState(false);
  const [joinedWaitlist, setJoinedWaitlist] = useState(false);

  const hasAnySlots = therapist.availability.some((d) => d.slots.length > 0);

  if (confirmed) {
    return (
      <div style={{ maxWidth: 480, margin: "100px auto", padding: 24, textAlign: "center" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", background: "#3A4530", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
          <Check size={26} color="#76875A" />
        </div>
        <h2 style={{ fontFamily: "Georgia, serif", fontSize: 22, color: "#ECE8DD", marginBottom: 8, fontWeight: 400 }}>Foglalás megerősítve</h2>
        <p style={{ fontSize: 14, color: "#9a978c", marginBottom: 24, lineHeight: 1.6 }}>
          {therapist.name} — {selectedDay && formatDate(selectedDay.date)}, {selectedSlot}
        </p>
        <SecondaryButton onClick={onBack}>Vissza a profilhoz</SecondaryButton>
      </div>
    );
  }

  if (joinedWaitlist) {
    return (
      <div style={{ maxWidth: 480, margin: "100px auto", padding: 24, textAlign: "center" }}>
        <div style={{ width: 56, height: 56, borderRadius: "50%", background: "#2e2a1c", display: "flex", alignItems: "center", justifyContent: "center", margin: "0 auto 20px" }}>
          <Clock size={26} color="#E8D5A8" />
        </div>
        <h2 style={{ fontFamily: "Georgia, serif", fontSize: 22, color: "#ECE8DD", marginBottom: 8, fontWeight: 400 }}>Felkerültél a várólistára</h2>
        <p style={{ fontSize: 14, color: "#9a978c", marginBottom: 24, lineHeight: 1.6 }}>
          Értesítünk, amint {therapist.name} naptárában szabad hely nyílik.
        </p>
        <SecondaryButton onClick={onBack}>Vissza a profilhoz</SecondaryButton>
      </div>
    );
  }

  return (
    <div style={{ maxWidth: 600, margin: "0 auto", padding: "24px 24px 60px" }}>
      <button onClick={onBack} style={{ display: "flex", alignItems: "center", gap: 6, background: "transparent", border: "none", color: "#9a978c", fontSize: 13, cursor: "pointer", marginBottom: 20 }}>
        <ChevronLeft size={16} /> Vissza
      </button>

      <div style={{ display: "flex", alignItems: "center", gap: 12, marginBottom: 24 }}>
        <Avatar color={therapist.avatarColor} initials={therapist.initials} src={therapist.imageUrl} size={48} />
        <div>
          <div style={{ fontSize: 16, fontWeight: 600, color: "#ECE8DD" }}>{therapist.name}</div>
          <div style={{ fontSize: 12.5, color: "#8a877d" }}>{formatPrice(therapist.price)} / alkalom</div>
        </div>
      </div>

      {!hasAnySlots ? (
        <div style={{ background: "#151513", border: "0.5px solid #232320", borderRadius: 12, padding: 24, textAlign: "center" }}>
          <p style={{ fontSize: 14, color: "#d4d2c8", marginBottom: 16 }}>
            {therapist.name} naptárában jelenleg nincs szabad időpont a következő két hétben.
          </p>
          <PrimaryButton onClick={() => setJoinedWaitlist(true)}>Várólistára kerülés</PrimaryButton>
        </div>
      ) : (
        <>
          <FilterLabel>Válassz napot</FilterLabel>
          <div style={{ display: "flex", gap: 8, overflowX: "auto", paddingBottom: 8, marginBottom: 20 }}>
            {therapist.availability.map((d, i) => (
              <button
                key={i}
                onClick={() => {
                  setSelectedDay(d);
                  setSelectedSlot(null);
                }}
                disabled={d.slots.length === 0}
                style={{
                  minWidth: 64,
                  padding: "10px 8px",
                  borderRadius: 10,
                  border: selectedDay === d ? "1.5px solid #76875A" : "0.5px solid #2e2e2b",
                  background: d.slots.length === 0 ? "#121210" : selectedDay === d ? "#3A4530" : "#181816",
                  color: d.slots.length === 0 ? "#4a4944" : selectedDay === d ? "#76875A" : "#d4d2c8",
                  cursor: d.slots.length === 0 ? "default" : "pointer",
                  flexShrink: 0,
                  fontSize: 11.5,
                  textAlign: "center",
                }}
              >
                {formatDate(d.date)}
              </button>
            ))}
          </div>

          {selectedDay && (
            <>
              <FilterLabel>Válassz időpontot</FilterLabel>
              <div style={{ display: "flex", gap: 8, flexWrap: "wrap", marginBottom: 28 }}>
                {selectedDay.slots.map((s) => (
                  <button
                    key={s}
                    onClick={() => setSelectedSlot(s)}
                    style={{
                      padding: "10px 18px",
                      borderRadius: 10,
                      border: selectedSlot === s ? "1.5px solid #76875A" : "0.5px solid #2e2e2b",
                      background: selectedSlot === s ? "#3A4530" : "#181816",
                      color: selectedSlot === s ? "#76875A" : "#d4d2c8",
                      cursor: "pointer",
                      fontSize: 13.5,
                    }}
                  >
                    {s}
                  </button>
                ))}
              </div>
            </>
          )}

          <PrimaryButton
            disabled={!selectedSlot}
            onClick={() => {
              if (!isLoggedIn) {
                onRequireLogin();
                return;
              }
              setConfirmed(true);
            }}
            style={{ width: "100%", padding: 14 }}
          >
            {selectedSlot ? `Foglalás megerősítése — ${formatPrice(therapist.price)}` : "Válassz időpontot"}
          </PrimaryButton>
        </>
      )}
    </div>
  );
}

function AuthView({ onComplete, onBack, role = "patient" }) {
  const [mode, setMode] = useState("register");
  return (
    <div style={{ maxWidth: 380, margin: "60px auto", padding: 24 }}>

      </button>
      <h2 style={{ fontFamily: "Georgia, serif", fontSize: 24, color: "#ECE8DD", marginBottom: 6, fontWeight: 400 }}>
        {role === "therapist" ? "Pszichológus belépés" : mode === "register" ? "Fiók létrehozása" : "Bejelentkezés"}
      </h2>
      <p style={{ fontSize: 13, color: "#8a877d", marginBottom: 24 }}>

        {tab === "bookings" && (
          <>
            <h2 style={{ fontFamily: "Georgia, serif", fontSize: 22, color: "#ECE8DD", marginBottom: 20, fontWeight: 400 }}>Foglalások</h2>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {mockBookings.map((b, i) => (
                <div key={i} style={{ background: "#151513", border: "0.5px solid #232320", borderRadius: 10, padding: 14, display: "flex", justifyContent: "space-between", alignItems: "center" }}>
                  <div>
                    <div style={{ fontSize: 14, color: "#ECE8DD", fontWeight: 500 }}>{b.patient}</div>
                    <div style={{ fontSize: 12.5, color: "#8a877d" }}>
                      {b.date} · {b.time}
                    </div>
                  </div>
                  <span
                    style={{
                      fontSize: 11,
                      padding: "4px 10px",
                      borderRadius: 20,
                      background: b.status === "Megerősítve" ? "#3A4530" : "#2e2a1c",
                      color: b.status === "Megerősítve" ? "#76875A" : "#E8D5A8",
                    }}
                  >
                    {b.status}
                  </span>
                </div>
              ))}
            </div>
          </>
        )}

        {tab === "availability" && (
          <>
            <h2 style={{ fontFamily: "Georgia, serif", fontSize: 22, color: "#ECE8DD", marginBottom: 8, fontWeight: 400 }}>Elérhetőség kezelése</h2>
            <p style={{ fontSize: 13, color: "#8a877d", marginBottom: 20 }}>Jelöld be, mely napokon és időpontokban fogadsz pácienseket.</p>
            <div style={{ display: "flex", flexDirection: "column", gap: 10 }}>
              {editTherapist.availability.slice(0, 7).map((d, i) => (
                <div key={i} style={{ display: "flex", alignItems: "center", justifyContent: "space-between", background: "#151513", border: "0.5px solid #232320", borderRadius: 10, padding: 12 }}>
                  <span style={{ fontSize: 13, color: "#d4d2c8", minWidth: 100 }}>{formatDate(d.date)}</span>
                  <div style={{ display: "flex", gap: 6, flexWrap: "wrap" }}>
                    {d.slots.length === 0 ? (
                      <span style={{ fontSize: 12, color: "#5a5852" }}>Nincs megadva</span>
                    ) : (
                      d.slots.map((s) => (
                        <span key={s} style={{ fontSize: 12, padding: "4px 9px", borderRadius: 8, background: "#3A4530", color: "#76875A" }}>
                          {s}
                        </span>
                      ))
                    )}
                  </div>
                  <button style={{ background: "transparent", border: "none", color: "#8a877d", cursor: "pointer" }}>
                    <Pencil size={14} />
                  </button>
                </div>
              ))}
            </div>
            <button style={{ display: "flex", alignItems: "center", gap: 6, marginTop: 14, background: "transparent", border: "0.5px dashed #3a3a37", color: "#9a978c", borderRadius: 8, padding: "10px 14px", fontSize: 12.5, cursor: "pointer" }}>
              <Plus size={14} /> Időpont hozzáadása
            </button>
          </>
        )}
      </div>
    </div>
  );
}

function SideTab({ icon, label, active, onClick }) {
  return (
    <div
      onClick={onClick}
      style={{
        display: "flex",
        alignItems: "center",
        gap: 10,
        padding: "9px 10px",
        borderRadius: 8,
        cursor: "pointer",
        marginBottom: 4,
        background: active ? "#3A4530" : "transparent",
        color: active ? "#76875A" : "#9a978c",
        fontSize: 13,
      }}
    >
      {icon} {label}
    </div>
  );
}

const MOCK_BOOKINGS = [
  { patient: "Szabó Júlia", date: "Jún 19.", time: "17:00", status: "Megerősítve" },
  { patient: "Kiss Bence", date: "Jún 20.", time: "10:00", status: "Megerősítve" },
  { patient: "Németh Réka", date: "Jún 22.", time: "14:00", status: "Várakozik" },
];

// ---------------------- 4. ROOT APP ----------------------

function IllikApp() {
  const [view, setView] = useState("landing"); // landing | results | profile | booking | auth | therapist-auth | therapist-dashboard
  const [filters, setFilters] = useState({ location: "Budapest (összes)", topic: "", maxPrice: 30000 });
  const [selectedTherapist, setSelectedTherapist] = useState(null);
  const [savedIds, setSavedIds] = useState([]);
  const [isLoggedIn, setIsLoggedIn] = useState(false);
  const [pendingBookingTherapist, setPendingBookingTherapist] = useState(null);
  const [therapistLoggedIn, setTherapistLoggedIn] = useState(false);

  const toggleSave = (id) => {
    setSavedIds((prev) => (prev.includes(id) ? prev.filter((x) => x !== id) : [...prev, id]));
  };

  return (
    <div style={{ background: "#0c0c0b", minHeight: "100vh", fontFamily: "-apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif" }}>
      <NavBar
        onLogoClick={() => setView("landing")}
        onLoginClick={() => setView("auth")}
        onTherapistAreaClick={() => setView(therapistLoggedIn ? "therapist-dashboard" : "therapist-auth")}
        role={isLoggedIn ? "patient" : null}
        onLogout={() => {
          setIsLoggedIn(false);
          setView("landing");
        }}
      />

      {view === "landing" && (
        <LandingView
          filters={filters}
          setFilters={setFilters}
          onSearch={() => setView("results")}
        />
      )}

      {view === "results" && (
        <ResultsView
          filters={filters}
          setFilters={setFilters}
          savedIds={savedIds}
          toggleSave={toggleSave}
          onSelectTherapist={(t) => {
            setSelectedTherapist(t);
            setView("profile");
          }}
        />
      )}

      {view === "profile" && (
        <ProfileView
          therapist={selectedTherapist}
          onBack={() => setView("results")}
          onBook={(t) => {
            setSelectedTherapist(t);
            setView("booking");
          }}
          savedIds={savedIds}
          toggleSave={toggleSave}
        />
      )}

      {view === "booking" && (
        <BookingView
          therapist={selectedTherapist}
          onBack={() => setView("profile")}
          isLoggedIn={isLoggedIn}
          onRequireLogin={() => {
            setPendingBookingTherapist(selectedTherapist);
            setView("auth");
          }}
        />
      )}

      {view === "auth" && (
        <AuthView
          role="patient"
          onBack={() => setView(pendingBookingTherapist ? "booking" : "landing")}
          onComplete={() => {
            setIsLoggedIn(true);
            setView(pendingBookingTherapist ? "booking" : "landing");
            setPendingBookingTherapist(null);
          }}
        />
      )}

      {view === "therapist-auth" && (
        <AuthView
          role="therapist"
          onBack={() => setView("landing")}
          onComplete={() => {
            setTherapistLoggedIn(true);
            setView("therapist-dashboard");
          }}
        />
      )}

      {view === "therapist-dashboard" && (
        <TherapistDashboard
          therapist={THERAPISTS[0]}
          mockBookings={MOCK_BOOKINGS}
          onLogout={() => {
            setTherapistLoggedIn(false);
            setView("landing");
          }}
        />
      )}
    </div>
  );
}

// ==========================================================================
ReactDOM.createRoot(document.getElementById("root")).render(<IllikApp />);
</script>
</body>
</html>
